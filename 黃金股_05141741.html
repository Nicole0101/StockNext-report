    `;
      };
      return `
  <div class="metric">
    <div class="table-lv1">${fmt(value, suffix)}</div>
    <div class="metric-sub">
      ${renderLine("M", m)}
      ${renderLine("Q", q)}
      ${renderLine("Y", y)}
    </div>
  </div>`;
    }

    function renderRangeMetric(current, low, high, suffix = "", cls = "") {
      return `
      <div class="metric metric-2line">
        <div class="table-lv1 ${cls}">${fmt(current, suffix)}</div>
        <div class="table-lv2">${fmt(low, suffix)}</div>
        <div class="table-lv2">${fmt(high, suffix)}</div>
      </div>`;
    }

    function distClass(val) {
      if (isNil(val)) return "";
      if (Number(val) > 0) return "up";
      if (Number(val) < 0) return "dn";
      return "";
    }

    function shortName(name) {
      const text = String(name ?? "-");
      return Array.from(text).slice(0, 3).join("");
    }

    function renderRow(s) {
      const chgPct = Number(s.chgPct ?? 0);
      const chgClass = chgPct >= 0 ? "up" : "dn";
      const chgSign = chgPct >= 0 ? "+" : "";

      return `
      <tr>
        <td>
          <div class="table-lv1">${s.code ?? ""}</div>
          <div class="table-lv2">${shortName(s.name)}</div>
        </td>

        <td class="col-lg">${renderRangeMetric(s.price, s.price_90d_low, s.price_90d_high)}</td>

        <td>
          <div class="table-lv1 ${chgClass}">${chgSign}${fmt(s.chg)}</div>
            <div class="table-lv2">${fmt(s.price_min)}</div>
            <div class="table-lv2">${fmt(s.price_max)}</div>
            <div class="table-lv3"><div class="table-lv3">(${(Number(s.price_max ?? 0) - Number(s.price_min ?? 0)).toFixed(2)})</div>            
        </td>
        
        <td class="col-md">
          <div class="table-lv1 ${chgClass}">${chgSign}${fmt(s.chgPct, "%")}</div>
          <div class="table-lv2">${fmt(s.amp, "%")}</div>
        </td>

        <td class="col-lg">
          <div class="table-lv1">${fmt(s.eps_Y)}</div>
          <div class="table-lv2">${fmt(s.eps_ttm)}</div>
        </td>

        <!-- 營收 -->
        <td class="col-lg">${renderMetric3(s.rev, s.rev_mom, s.rev_qoq, s.rev_yoy)}</td>

        <!-- 毛利 -->
        <td class="col-lg">
          ${renderMetric3(
        s.gross_margin,
        null,   // M
        s.gross_margin_qoq,
        s.gross_margin_yoy_diff
      )}
        </td>

        <!-- 營益 -->
        <td class="col-lg">
          ${renderMetric3(
        s.operating_margin,
        null,   // M,
        s.operating_margin_qoq,
        s.operating_margin_yoy_diff
      )}
        </td>

        <!-- 淨利 -->
        <td class="col-lg">
          ${renderMetric3(
        s.net_margin,
        null,   // M
        s.net_margin_qoq,
        s.net_margin_yoy_diff
      )}
        </td>

        <td class="col-md">${fmt(s.score)}</td>
        <td class="col-md">${fmt(s.yield_value * 0.65, "%")}</td>
        <td class="col-lg">${renderRangeMetric(s.per_latest, s.per_90d_low, s.per_90d_high)}</td>
        <td class="col-lg">${renderRangeMetric(s.pbr_latest, s.pbr_90d_low, s.pbr_90d_high)}</td>
        <td>
          <!-- KD 趨勢 -->
          <div class="table-lv1 ${trendClass(s.kd_score)}">${fmtTrend(s.kd_score)}</div>
          <!-- KD 數值 -->
            <div class="table-lv2">K ${fmt(s.k)}</div>
            <div class="table-lv2">D ${fmt(s.d)}</div>
        </td>   
        <td class="col-md">
          <div class="table-lv1 ${trendClass(s.bb_score)}">  ${fmtTrend(s.bb_score)}</div>
          
          ${renderRangeMetric(s.bb_pct, s.bb_lower, s.bb_upper)}
        </td>

        <td class="col-lg">
          ${renderRangeMetric(s.bias6, s.bias6_min, s.bias6_max, "%", distClass(s.bias6))}
        </td>

        <td class="col-lg">
          ${renderRangeMetric(s.bias18, s.bias18_min, s.bias18_max, "%", distClass(s.bias18))}
        </td>

        <td class="col-lg">
          ${renderRangeMetric(s.bias50, s.bias50_min, s.bias50_max, "%", distClass(s.bias50))}
        </td>
             
        <td class="col-md">
          <div class="table-lv1">${fmt(s.volume)}</div>
          <div class="table-lv2">昨: ${fmt(s.prev_volume)}</div>
        </td>

        <td class="col-md ${trendClass(s.volume_ratio)}">
          <div class="table-lv1">${isNil(s.volume_ratio) ? "-" : `${fmtTrend(s.volume_ratio)} ${fmt(s.volume_ratio, "%")}`}</div>
          <div class="table-lv2">${isNil(s.volume_add) ? "-" : `${fmt(s.volume_add)} 張`}</div>
        </td>

        <td class="signal-cell">
          <div class="signal-wrap">
            <div class="sig ${s.sig == 1 ? 'up' : s.sig == -1 ? 'dn' : 'watch'}">${s.signal ?? '等待觀察'}</div>                 
              <div class="table-lv2">${s.signal_text ?? ""}</div>
              <div class="table-lv3">${s.entry_note ? s.entry_note : ""}</div>
              <div class="table-lv3">${s.reason ?? ""}</div>          
          </div>
        </td>


        </tr>
        `;
    }

    function renderMobileCard(s) {
      const chgPct = Number(s.chgPct ?? 0);
      const chgClass = chgPct >= 0 ? "up" : "dn";
      const chgSign = chgPct >= 0 ? "+" : "";

      return `
      <div class="stock-card">
        <div class="stock-head">
          <div>
            <div class="table-lv1"><b>${shortName(s.name)} (${s.code ?? ""})</b></div>
            <div class="table-lv2 ${chgClass}">${chgSign}${fmt(s.chg)} / ${chgSign}${fmt(s.chgPct, "%")}</div>
          </div>
          <div class="stock-value">${renderRangeMetric(s.price, s.price_90d_low, s.price_90d_high)}</div>
        </div>
        
        <div class="stock-grid">
          <div class="stock-item">
            <div class="stock-label">日PER 90天LH</div>
            <div class="stock-value">${renderRangeMetric(s.per_latest, s.per_90d_low, s.per_90d_high)}</div>
          </div>
          <div class="stock-item">
            <div class="stock-label">營收</div>
            <div class="stock-value">${renderMetric3(s.rev, s.rev_mom, s.rev_qoq, s.rev_yoy)}</div>
          </div>
          <div class="stock-item">
            <div class="stock-label">利率</div>
            <div class="stock-value">${renderMetric3(s.gross_margin, null, s.gross_margin_qoq, s.gross_margin_yoy_diff)}</div>
          </div>
          <div class="stock-item">
            <div class="stock-label">營益率</div>
            <div class="stock-value">${renderMetric3(s.operating_margin, null, s.operating_margin_qoq, s.operating_margin_yoy_diff)}</div>
          </div>
          <div class="stock-item">
            <div class="stock-label">淨利率</div>
            <div class="stock-value">${renderMetric3(s.net_margin, null, s.net_margin_qoq, s.net_margin_yoy_diff)}</div>
          </div>
          <div class="stock-item">
            <div class="stock-label">日PBR 90天LH</div>
            <div class="stock-value">${renderRangeMetric(s.pbr_latest, s.pbr_90d_low, s.pbr_90d_high)}</div>
          </div>
          <div class="stock-item">
            <div class="stock-label">日KD 3天趨勢</div>
            <div class="stock-value">
              <div class="table-lv1">${fmt(s.k)} / ${fmt(s.d)}</div>
            </div>
          </div>

          <div class="stock-item">
            <div class="stock-label">日布林% 價格LH</div>
            <div class="stock-value">
              <div class="table-lv1 ${trendClass(s.bb_score)}">${fmtTrend(s.bb_score)}</div>
              ${renderRangeMetric(s.bb_pct, s.bb_lower, s.bb_upper)}
            </div>
          </div>

          <div class="stock-item">
            <div class="stock-label">日Bias6 LH</div>
            <div class="stock-value">
              ${renderRangeMetric(s.bias6, s.bias6_min, s.bias6_max, "%")}
            </div>
          </div>

          <div class="stock-item">
            <div class="stock-label">日Bias18 LH</div>
            <div class="stock-value">
              ${renderRangeMetric(s.bias18, s.bias18_min, s.bias18_max, "%")}
            </div>
          </div>

          
          <div class="stock-item">
            <div class="stock-label">日Bias50 LH</div>
            <div class="stock-value">
              ${renderRangeMetric(s.bias50, s.bias50_min, s.bias50_max, "%")}
            </div>
          </div>
          
          <div class="stock-item">
            <div class="stock-label">日成交量</div>
            <div class="stock-value">
              <div>${fmt(s.volume)} 張</div>
              <div class="table-lv2">昨: ${fmt(s.prev_volume)}</div>
            </div>
          </div>

          <div class="stock-item">
            <div class="stock-label">日量增%</div>
            <div class="stock-value">
              <div class="${(s.volume_ratio ?? 0) > 0 ? 'up' : 'dn'}">
                ${fmt(s.volume_ratio, "%")}
              </div>
              <div class="table-lv2">${fmt(s.volume_add)} 張</div>
            </div>
          </div>

        </div>  <!-- stock-grid -->

          <div class="stock-signal">
        <span class="sig ${s.sig == 1 ? 'up' : s.sig == -1 ? 'dn' : 'watch'}">
          ${s.signal ?? '等待觀察'}
        </span>
              <div class="table-lv2">${s.signal_text ?? ""}</div>
              <div class="table-lv3">${s.entry_note ?? ""}</div>
              <div class="table-lv3">${s.reason ?? ""}</div>
          </div>

      </div>
      `;
    }


    function renderTable(data) {
      document.getElementById("stockBody").innerHTML = data.map(renderRow).join("");
    }

    function renderMobileCards(data) {
      document.getElementById("mobileList").innerHTML = data.map(renderMobileCard).join("");
    }

    function getSortValue(s, key) {
      switch (key) {
        case "name":
          return s.name ?? "";
        case "code":
          return s.code ?? "";
        case "sig":
          return Number(s.sig ?? -999999);
        case "yield_value":
          return Number(((s.yield_value ?? 0) * 0.65).toFixed(4));
        case "score":
        case "per_latest":
        case "pbr_latest":
          return Number(s[key] ?? -999999);
        default: {
          const value = s[key];
          if (isNil(value) || value === "") return -999999;
          const num = Number(value);
          return Number.isNaN(num) ? String(value) : num;
        }
      }
    }

    function sortStocks(key) {
      if (currentSortKey === key) {
        currentSortDirection = currentSortDirection === "asc" ? "desc" : "asc";
      } else {
        currentSortKey = key;
        currentSortDirection = "asc";
      }

      sortedStocks.sort((a, b) => {
        const aVal = getSortValue(a, key);
        const bVal = getSortValue(b, key);
        const bothNumbers = typeof aVal === "number" && typeof bVal === "number";

        if (bothNumbers) {
          return currentSortDirection === "asc" ? aVal - bVal : bVal - aVal;
        }

        const result = String(aVal).localeCompare(String(bVal), "zh-Hant");
        return currentSortDirection === "asc" ? result : -result;
      });

      renderTable(sortedStocks);
      renderMobileCards(sortedStocks);
      updateSortIndicators();
    }

    function updateSortIndicators() {
      document.querySelectorAll("thead th").forEach((th) => {
        const key = th.dataset.key;
        if (!key) return;

        if (!th.dataset.label) {
          th.dataset.label = th.innerHTML.replace(/\s*[▲▼]$/, "");
        }

        th.innerHTML = key === currentSortKey
          ? `${th.dataset.label} ${currentSortDirection === "asc" ? "▲" : "▼"}`
          : th.dataset.label;
      });
    }

    function bindSorting() {
      document.querySelectorAll("thead th[data-key]").forEach((th) => {
        th.addEventListener("click", () => {
          sortStocks(th.dataset.key);
        });
      });
    }


    const buy = sortedStocks.filter(s => s?.signal === "買進").length;
    const sell = sortedStocks.filter(s => s?.signal === "賣出").length;
    const watch = sortedStocks.filter(s => s?.signal === "等待觀察").length;
    const hold = sortedStocks.filter(
      s => s?.signal === "觀察再買進" || s?.signal === "觀察再賣出").length;




    renderTable(sortedStocks);
    renderMobileCards(sortedStocks);
    bindSorting();

    document.getElementById("buyCount").innerText = buy;
    document.getElementById("sellCount").innerText = sell;
    document.getElementById("watchCount").innerText = watch;
    document.getElementById("holdCount").innerText = hold;
  </script>

</body>

</html>
