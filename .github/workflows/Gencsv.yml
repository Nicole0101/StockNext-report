name: Gen Gold CSV

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas

      - name: Run build_gold.py
        run: python Gencsv.py

      - name: Check generated files
        run: |
          pwd
          ls -la
          ls -la Allcsv || true
          test -f Gold.csv && echo "Gold.csv exists" || echo "Gold.csv missing"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Gold.csv
          git diff --cached --quiet || git commit -m "Update Gold.csv"
          git push