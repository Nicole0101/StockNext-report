name: Gen CSV

on:
  workflow_dispatch:
  push:
    paths:
      - "Goldcsv/**"
      - "GenGold_csv.py"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pandas
        run: pip install pandas

      - name: Run script
        run: python GenGold_csv.py

      - name: Check files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Commit Gold.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Gold.csv Goldcsv/Gold.csv
          git diff --cached --quiet || git commit -m "Auto update Gold.csv"
          git push
