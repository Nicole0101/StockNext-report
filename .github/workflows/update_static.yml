name: Update Static CSV
on:
  workflow_dispatch:
  schedule:
    - cron: "10 22 * * *"   # 台灣時間每天 06:10

permissions:
  contents: write

jobs:
  update-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests jinja2 FinMind PyYAML loguru tqdm

      - name: Prepare config for static build
        run: |
          cat > config.py <<'PY'
          REPORT_TYPE = "Gold"
          CSV_FILE = "Gold.csv"
          REPORT_TITLE = "(黃金股)技術分析報告"
          OUTPUT_FILE = "黃金股"
          STATIC_OUTPUT_FILE = "AllStatic.csv"
          PY

      - name: Generate AllStatic.csv
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          STATIC_CSV_FILE: AllStatic.csv
        run: |
          python generate_static_csv.py

      - name: Commit AllStatic.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AllStatic.csv config.py
          git diff --cached --quiet || git commit -m "Update AllStatic.csv"

      - name: Push changes
        run: |
          git push
