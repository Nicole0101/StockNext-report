name: Build Gold CSV

on:
  workflow_dispatch:
  push:
    paths:
      - "Git/Gold/Gold_csv/**"
      - "build_gold.py"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pandas
        run: pip install pandas

      - name: Run script
        run: python build_gold.py

      - name: Commit Gold.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Git/Gold/Gold.csv Git/Gold/Goldcsv/Gold.csv
          git diff --cached --quiet || git commit -m "Auto update Gold.csv"
          git push
