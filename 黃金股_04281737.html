    .card {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: clamp(8px, 1vw, 15px);
      overflow: hidden;
    }

    .table-scroll {
      overflow: auto;
      max-height: min(70vh, 700px);
      position: relative;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: clamp(11px, 1vw, 13px);
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1c2330;

    thead th:hover {
      background: #263041;
    }

    tbody td {
      background: #161b22;
      position: relative;
      z-index: 1;
    }

    tbody td:first-child {
      position: sticky;
      left: 0;
      background: #161b22;
      z-index: 150;
    }

    thead th:first-child {
      position: sticky;
      top: 0;
      left: 0;
      background: #1c2330;
      z-index: 250;
    }

    th,
    td {
      padding: clamp(6px, 0.8vw, 10px);
      border-bottom: 1px solid #30363d;
      border-right: 1px solid #30363d;
      white-space: nowrap;
      vertical-align: middle;
    }

    thead th,

    }

    .sig.up {
      background: #3fb95022;

    }

      background: #f8514922;
      color: #f85149;
    }

    .sig.watch {
      background: #d2992222;

    .summary {

      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .box {

      border-radius: 8px;
      text-align: center;
      min-width: 0;
      font-size: clamp(12px, 1vw, 14px);

    .buy {

    }

    .sell {

    .watch {
      background: #d2992222;
    }

    .hold {

      line-height: 1.4;

    .metric-note {

      margin-top: 2px;
      font-size: 10px;
      color: #8b949e;
      white-space: normal;
    }

    .text-red {
      color: #ff4d4f;

    .text-green {
      color: #00b050;
    }

    .mobile-list {

      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;

    .stock-item {

    .stock-label {
      color: #8b949e;
      font-size: 11px;
      margin-bottom: 2px;
    }

    .stock-value {
      word-break: break-word;
    }

    .stock-signal {

      padding-top: 10px;
      border-top: 1px solid #30363d;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 1024px) {

    function isNil(v) {
      return v === null || v === undefined || (typeof v === "number" && Number.isNaN(v));
    }

    function fmt(v, suffix = "") {
      if (v === null || v === undefined || v === "" || Number.isNaN(v)) return "-";
      const num = Number(v);
      if (num === 0) return "0" + suffix;
      // 判斷是否為整數
      const isInteger = Number.isInteger(num);
      const formatted = isInteger
        ? num.toLocaleString("en-US")               // 1,234
        : num.toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });                                       // 1,234.5
      return formatted + suffix;
    }

    function fmtTrend(v) {
      if (v >= 1) return "↑↑";
      if (v > 0) return "↑";
      if (v <= -1) return "↓↓";
      if (v < 0) return "↓";
      return "→";
    }

    function trendClass(v) {
      if (v >= 1) return "up strong";
      if (v > 0) return "up";
      if (v <= -1) return "dn strong";
      if (v < 0) return "dn";
      return "";
    }

    function renderMetric3(value, m, q, y, suffix = "") {
      const renderLine = (label, v) => {
        if (isNil(v)) {
          return `<div>${label} -</div>`;
        }
        return `
      <div class="${trendClass(v)}">
        ${label} ${fmtTrend(v)} ${fmt(v, "%")}
      </div>
    `;
      };
      return `
  <div class="metric">
    <div class="table-lv1">${fmt(value, suffix)}</div>
    <div class="metric-sub">
      ${renderLine("M", m)}
      ${renderLine("Q", q)}
      ${renderLine("Y", y)}
    </div>
  </div>`;
    }

    function renderRangeMetric(current, low, high, suffix = "", cls = "") {
      return `
      <div class="metric metric-2line">
        <div class="table-lv1 ${cls}">${fmt(current, suffix)}</div>
        <div class="table-lv2">${fmt(low, suffix)}</div>
        <div class="table-lv2">${fmt(high, suffix)}</div>
      </div>`;
    }

    function distClass(val) {
      if (isNil(val)) return "";
      if (Number(val) > 0) return "up";
      if (Number(val) < 0) return "dn";
      return "";
    }

    function renderTable(data) {

    function renderMobileCards(data) {

    }

    function getSortValue(s, key) {
      switch (key) {
        case "name":
          return s.name ?? "";
        case "code":
          return s.code ?? "";
        case "sig":
          return Number(s.sig ?? -999999);
        case "yield_value":
          return Number(((s.yield_value ?? 0) * 0.65).toFixed(4));
        case "score":
        case "per_latest":
        case "pbr_latest":
          return Number(s[key] ?? -999999);
        default: {
          const value = s[key];
          if (isNil(value) || value === "") return -999999;
          const num = Number(value);
          return Number.isNaN(num) ? String(value) : num;
        }
      }
    }

    function sortStocks(key) {
      if (currentSortKey === key) {
        currentSortDirection = currentSortDirection === "asc" ? "desc" : "asc";
      } else {
        currentSortKey = key;
        currentSortDirection = "asc";
      }

      sortedStocks.sort((a, b) => {
        const aVal = getSortValue(a, key);
        const bVal = getSortValue(b, key);
        const bothNumbers = typeof aVal === "number" && typeof bVal === "number";

        if (bothNumbers) {
          return currentSortDirection === "asc" ? aVal - bVal : bVal - aVal;
        }

        const result = String(aVal).localeCompare(String(bVal), "zh-Hant");
        return currentSortDirection === "asc" ? result : -result;
      });

      renderTable(sortedStocks);
      renderMobileCards(sortedStocks);
      updateSortIndicators();
    }

    function updateSortIndicators() {
      document.querySelectorAll("thead th").forEach((th) => {
        const key = th.dataset.key;
        if (!key) return;

        if (!th.dataset.label) {
          th.dataset.label = th.innerHTML.replace(/\s*[▲▼]$/, "");
        }

        th.innerHTML = key === currentSortKey
          ? `${th.dataset.label} ${currentSortDirection === "asc" ? "▲" : "▼"}`
          : th.dataset.label;
      });
    }

    function bindSorting() {
      document.querySelectorAll("thead th[data-key]").forEach((th) => {
        th.addEventListener("click", () => {
          sortStocks(th.dataset.key);
        });
      });
    }
